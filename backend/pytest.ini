[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
omit =
    tests/*
    migrations/*
    setup_db.py
    setup_db.sh
    create_test_users.py
    wsgi.py
    migrate.py

[coverage:report]
show_missing = True
